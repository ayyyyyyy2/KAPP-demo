<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Vendors - Admin Only</title>
    <link rel="stylesheet" href="all-vendors.css">
</head>
<body>
    <!-- Add back button at top -->
    <button class="back-btn" onclick="goBackToDashboard()">← Back to Dashboard</button>
    
    <div class="vendors-container">
        <h1 class="vendors-title">ALL VENDORS</h1>
        
        <!-- Add Hog's Head button with logo -->
        <div class="vendor-button-container">
            <button class="hogs-head-btn" onclick="goToHogsHead()">
                <div class="hogs-head-logo">
                    <svg width="60" height="60" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <!-- Pig head with radiating lines -->
                        <g transform="translate(50,50)">
                            <!-- Radiating lines background -->
                            <g stroke="#8B4513" stroke-width="2" opacity="0.7">
                                <line x1="0" y1="-40" x2="0" y2="-50" />
                                <line x1="14" y1="-38" x2="18" y2="-47" />
                                <line x1="26" y1="-30" x2="33" y2="-38" />
                                <line x1="34" y1="-18" x2="43" y2="-23" />
                                <line x1="38" y1="-4" x2="48" y2="-5" />
                                <line x1="38" y1="10" x2="48" y2="13" />
                                <line x1="34" y1="22" x2="43" y2="28" />
                                <line x1="26" y1="32" x2="33" y2="41" />
                                <line x1="14" y1="38" x2="18" y2="48" />
                                <line x1="0" y1="40" x2="0" y2="50" />
                                <line x1="-14" y1="38" x2="-18" y2="48" />
                                <line x1="-26" y1="32" x2="-33" y2="41" />
                                <line x1="-34" y1="22" x2="-43" y2="28" />
                                <line x1="-38" y1="10" x2="-48" y2="13" />
                                <line x1="-38" y1="-4" x2="-48" y2="-5" />
                                <line x1="-34" y1="-18" x2="-43" y2="-23" />
                                <line x1="-26" y1="-30" x2="-33" y2="-38" />
                                <line x1="-14" y1="-38" x2="-18" y2="-47" />
                            </g>
                            
                            <!-- Pig head -->
                            <circle cx="0" cy="0" r="25" fill="#F4A460" stroke="#8B4513" stroke-width="2"/>
                            
                            <!-- Ears -->
                            <ellipse cx="-15" cy="-20" rx="8" ry="12" fill="#F4A460" stroke="#8B4513" stroke-width="1.5" transform="rotate(-30)"/>
                            <ellipse cx="15" cy="-20" rx="8" ry="12" fill="#F4A460" stroke="#8B4513" stroke-width="1.5" transform="rotate(30)"/>
                            
                            <!-- Eyes -->
                            <circle cx="-8" cy="-5" r="3" fill="#000"/>
                            <circle cx="8" cy="-5" r="3" fill="#000"/>
                            
                            <!-- Snout -->
                            <ellipse cx="0" cy="8" rx="10" ry="8" fill="#DEB887" stroke="#8B4513" stroke-width="1.5"/>
                            
                            <!-- Nostrils -->
                            <circle cx="-3" cy="8" r="1.5" fill="#8B4513"/>
                            <circle cx="3" cy="8" r="1.5" fill="#8B4513"/>
                        </g>
                    </svg>
                </div>
                <span class="hogs-head-text">HOG'S HEAD</span>
            </button>
            
            <!-- Add Żona Krawca button with logo -->
            <button class="zona-krawca-btn" onclick="goToZonaKrawca()">
                <div class="zona-krawca-logo">
                    <svg width="60" height="60" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                        <!-- Black background circle -->
                        <circle cx="100" cy="100" r="100" fill="#000000"/>
                        
                        <!-- ŻONA text -->
                        <text x="100" y="75" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">ŻONA</text>
                        
                        <!-- KRAWCA text -->
                        <text x="100" y="105" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">KRAWCA</text>
                        
                        <!-- Decorative elements -->
                        <line x1="40" y1="130" x2="160" y2="130" stroke="white" stroke-width="2"/>
                        
                        <!-- CUKIERNIA text -->
                        <text x="100" y="150" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="white" text-anchor="middle" letter-spacing="2px">CUKIERNIA</text>
                        
                        <!-- PIEKARNIA text -->
                        <text x="100" y="170" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="white" text-anchor="middle" letter-spacing="1px">PIEKARNIA</text>
                    </svg>
                </div>
                <span class="zona-krawca-text">ŻONA KRAWCA</span>
            </button>
        </div>
    </div>
    
    <script>
        function goBackToDashboard() {
            // Get user data from sessionStorage or URL referrer
            const userData = sessionStorage.getItem('adminUserData');
            
            if (userData) {
                const user = JSON.parse(userData);
                const params = new URLSearchParams({
                    name: user.name,
                    email: user.email,
                    regd_no: user.regd_no,
                    points: user.points
                });
                window.location.href = `/dashboard-admin?${params.toString()}`;
            } else {
                // Fallback: redirect without parameters
                window.location.href = '/dashboard-admin';
            }
        }
        
        function goToHogsHead() {
            window.location.href = '/hogshead';
        }
        
        function goToZonaKrawca() {
            window.location.href = '/zonakrawca';
        }
        
        // Store user data when page loads (if coming from dashboard)
        window.addEventListener('load', function() {
            const referrer = document.referrer;
            if (referrer.includes('dashboard-admin')) {
                // Try to get user data from the referrer URL
                const referrerUrl = new URL(referrer);
                const params = referrerUrl.searchParams;
                
                if (params.get('name')) {
                    const userData = {
                        name: params.get('name'),
                        email: params.get('email'),
                        regd_no: params.get('regd_no'),
                        points: params.get('points') || '0'
                    };
                    sessionStorage.setItem('adminUserData', JSON.stringify(userData));
                }
            }
        });
    </script>
</body>
</html>
